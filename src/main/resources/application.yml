server:
  port: 8081

spring:
  application:
    name: ai-spring-framework
  
  datasource:
    url: jdbc:mysql://localhost:3306/ai_framework?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: MyNewPass123!
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  
  # Flyway 数据库迁移配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true
    encoding: UTF-8
  
  # Druid 配置
  druid:
    # 初始化连接数
    initial-size: 5
    # 最小空闲连接数
    min-idle: 10
    # 最大活跃连接数
    max-active: 50
    # 获取连接最大等待时间 (毫秒)
    max-wait: 60000
    # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
    time-between-eviction-runs-millis: 60000
    # 配置一个连接在池中最小生存的时间，单位是毫秒
    min-evictable-idle-time-millis: 300000
    # 用来检测连接是否有效的 sql
    validation-query: SELECT 1
    # 建议配置为 true，不影响性能，并且保证安全性
    test-while-idle: true
    # 申请连接的时候检测，如果空闲时间大于 timeBetweenEvictionRunsMillis，执行 validationQuery 检测连接是否有效
    test-on-borrow: false
    # 归还连接的时候检测
    test-on-return: false
    # 是否缓存 preparedStatement，也就是 PSCache
    pool-prepared-statements: true
    # 配置监控统计拦截的 filters
    filters: stat,wall,slf4j
    # 通过 connectProperties 属性来打开 mergeSql 功能；慢 SQL 记录
    connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
    # 合并多个 DruidDataSource 的监控数据为一个页面
    use-global-data-source-stat: true
    
    # Stat 监控配置
    filter:
      stat:
        slow-sql-millis: 5000
        log-slow-sql: true
        enabled: true
      wall:
        enabled: true
        config:
          delete-allow: false
          drop-table-allow: false
      slf4j:
        enabled: true
        statement-create-after-log-enabled: false
        statement-close-after-log-enabled: false
        result-set-open-after-log-enabled: false
        data-source-connect-after-log-enabled: false
    
    # 监控页面配置
    stat-view-servlet:
      enabled: true
      url-pattern: /druid/*
      reset-enable: false
      login-username: admin
      login-password: admin123
      allow: 127.0.0.1
    
    # Web 监控配置
    web-stat-filter:
      enabled: true
      url-pattern: /*
      exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
  
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# 向量操作
milvus:
  enabled: true
  host: localhost
  port: 19530
  username: admin
  password: sdlkg007
  database: default
  default-collection: default_collection

# LangChain4j + 通义千问配置
langchain4j:
  qwen:
    enabled: true
    provider: ${LLM_PROVIDER:qwen}
    api-key: ${QWEN_API_KEY:sk-sp-5c3871f8c08248ce89f1499805eeb90a}
    base-url: ${QWEN_BASE_URL:https://coding.dashscope.aliyuncs.com/v1}
    model-name: ${QWEN_MODEL:qwen3.5-plus}
    temperature: 0.7
    timeout: 60s
    # 视觉模型配置
    vision-model: ${QWEN_VISION_MODEL:qwen-vl-max}
    vision-base-url: ${QWEN_VISION_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}

  # 小米 MiMo v2 Pro 配置
  mimo:
    enabled: true
    api-key: ${MIMO_API_KEY:tp-ccqd51o52scgutf8rjfy24ihd7ilg7g6imhlldnz43drk35v}
    base-url: ${MIMO_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
    model-name: ${MIMO_MODEL:mimo-v2-pro}
    temperature: 0.7
    timeout: 60s

  # Ollama 配置 (开源模型)
  ollama:
    enabled: true  # 启用开源模型时改为 true
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model-name: ${OLLAMA_MODEL:deepseek-r1}  # 文本模型
    vision-model: ${OLLAMA_VISION_MODEL:llava}  # 视觉模型
    temperature: 0.7
    timeout: 60s
  
  # 智谱 AI Embedding 配置
  zhipu:
    enabled: true
    api-key: ${ZHIPU_API_KEY:d9659beb76734852b99d8ef82a9edddc.PARjQOMrVJ0hKrqc}
    base-url: https://open.bigmodel.cn/api/paas/v4
    embedding-model: text_embedding
  
  # 视觉识别配置
  vision:
    # 提供商选择：qwen (云端) 或 ollama (本地)
    provider: ${VISION_PROVIDER:qwen}
    enabled: false
    upload-path: ./uploads/images
    max-size: 10MB
    allowed-types: image/jpeg,image/png,image/gif,image/webp
  
  # ASR 语音识别配置
  asr:
    enabled: false
    provider: whisper-local  # whisper-local (本地) 或 whisper-api (云端)
    model: tiny  # whisper 模型：tiny, base, small, medium, large
    language: zh  # 识别语言：zh (中文), en (英文)
    upload-path: ./uploads/audio
    max-size: 25MB
    allowed-types: audio/wav,audio/mp3,audio/mpeg,audio/ogg,audio/webm,audio/flac
  
  # TTS 语音合成配置
  tts:
    enabled: true
    provider: edge  # edge (免费)/azure/google/baidu
    voice: zh-CN-XiaoxiaoNeural  # 默认语音
    rate: 1.0  # 语速 0.5-2.0
    pitch: 1.0  # 音调 0.5-2.0
    output-path: ./uploads/audio/tts
  
  # OCR 文字识别配置
  ocr:
    enabled: true
    provider: tesseract  # tesseract/paddle/easyocr/azure
    lang: chi_sim+eng  # 语言
    output-path: ./uploads/ocr
  
  # 图片生成配置
  image-gen:
    enabled: true
    provider: dall-e-3  # dall-e-3/stable-diffusion/midjourney
    size: 1024x1024  # 尺寸
    quality: standard  # standard/hd
    style: vivid  # vivid/natural
    output-path: ./uploads/generated

# 日志配置
logging:
  level:
    root: INFO
    com.example.aiframework: DEBUG
    dev.langchain4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    title: AI Spring Framework API

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.aiframework.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 聊天记忆配置
chat:
  memory:
    enabled: true              # 是否启用记忆功能
    window-size: 10            # 记忆窗口大小 (保留最近 N 条消息)
  
  # 会话摘要配置
  summary:
    auto-generate: true        # 是否自动生成摘要
    message-threshold: 20      # 消息数量达到多少时生成摘要
  
  # 清理任务配置
  cleanup:
    enabled: false             # 是否启用定时清理
    retention-days: 90         # 保留天数 (默认 90 天)

# RAG 配置
rag:
  memory:
    enabled: true              # 是否启用 RAG 记忆检索
    top-k: 5                   # 检索的相关记忆数量
    similarity-threshold: 0.7  # 向量相似度阈值
    keyword-weight: 0.3        # 关键词检索权重 (0-1，默认 30%)
    
    # 记忆压缩配置
    compress:
      enabled: true            # 是否启用长对话自动压缩
      message-threshold: 20    # 消息数量达到多少时触发压缩
    
    # 重排序配置
    rerank:
      enabled: true            # 是否启用 Cross-Encoder 重排序
      top-k: 3                 # 重排序后保留的数量

# Redis 缓存配置
redis:
  cache:
    enabled: true              # 是否启用 Redis 缓存
    prefix: "chat:session:"    # Key 前缀
    ttl-hours: 24              # 过期时间 (小时)
    max-size: 100              # 每个会话最大消息数

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
    redis:
      enabled: true

# JWT 配置
jwt:
  secret: ai-spring-framework-secret-key-2024-very-long-string-for-security
  expiration: 86400000  # Token 过期时间（毫秒）默认 24 小时
  header: Authorization
  prefix: Bearer
