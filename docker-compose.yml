version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: ai-framework-mysql
    environment:
      MYSQL_ROOT_PASSWORD: MyNewPass123!
      MYSQL_DATABASE: ai_framework
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ai-network
  redis:
    image: redis:7-alpine
    container_name: ai-framework-redis
    ports:
      - "6379:6379"
    networks:
      - ai-network
  app:
    build: .
    container_name: ai-framework-app
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ai_framework
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=MyNewPass123!
      - SPRING_REDIS_HOST=redis
    depends_on:
      - mysql
      - redis
    networks:
      - ai-network
volumes:
  mysql_data:
  redis_data:
networks:
  ai-network:
