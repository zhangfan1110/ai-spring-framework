version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: ai-framework-mysql
    environment:
      MYSQL_ROOT_PASSWORD: MyNewPass123!
      MYSQL_DATABASE: ai_framework
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ai-network
volumes:
  mysql_data:
networks:
  ai-network:
